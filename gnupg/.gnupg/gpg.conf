# ---------------------------------------------------------------------------
# GnuPG Configuration
# ---------------------------------------------------------------------------

# ---------------------------------------------------------------------------
# Key Display
# ---------------------------------------------------------------------------

# Use long key IDs to reduce collision risk
keyid-format long

# Always show fingerprints in key listings
with-fingerprint

# Show UID validity in listings and verifications
list-options show-uid-validity
verify-options show-uid-validity

# Consistent machine-parseable output
fixed-list-mode

# ---------------------------------------------------------------------------
# Algorithm Preferences
# ---------------------------------------------------------------------------

# Prefer strong algorithms for new keys and operations
personal-cipher-preferences AES256 AES192 AES
personal-digest-preferences SHA512 SHA384 SHA256
personal-compress-preferences ZLIB BZIP2 ZIP Uncompressed

# Default preferences advertised when creating new keys
default-preference-list SHA512 SHA384 SHA256 AES256 AES192 AES ZLIB BZIP2 ZIP Uncompressed

# Use SHA-512 for certifying other keys
cert-digest-algo SHA512

# Use AES-256 for symmetric encryption (e.g. --symmetric)
s2k-cipher-algo AES256
s2k-digest-algo SHA512
s2k-mode 3
s2k-count 65011712

# ---------------------------------------------------------------------------
# Behavior
# ---------------------------------------------------------------------------

# UTF-8 everywhere
charset utf-8

# Strip version string and comments from output to reduce metadata leakage
no-emit-version
no-comments

# Refuse to run if GnuPG cannot get a secure memory area
require-secmem

# ---------------------------------------------------------------------------
# Keyserver
# ---------------------------------------------------------------------------

keyserver hkps://keys.openpgp.org

# Automatically fetch keys from the keyserver when verifying signatures
auto-key-retrieve

# Include revoked keys in search results
keyserver-options include-revoked

# ---------------------------------------------------------------------------
# Optional — uncomment to enable
# ---------------------------------------------------------------------------

# Set your default signing/encryption key
# default-key 0xYOUR_KEY_ID

# Hide recipient key IDs in encrypted messages (privacy, but recipient
# must try all their keys to decrypt)
# throw-keyids

# Trust model: tofu+pgp combines Trust-On-First-Use with the classic web
# of trust — good for personal use
# trust-model tofu+pgp
